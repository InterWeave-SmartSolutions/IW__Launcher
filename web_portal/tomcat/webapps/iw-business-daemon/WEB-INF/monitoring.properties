# ============================================================================
# WEBHOOK NOTIFICATION SERVICE
# ============================================================================

# Enable/disable webhook notifications
# When false, WebhookNotificationService will not start
webhook.enabled=true

# Default HTTP timeout for webhook requests (seconds)
# Can be overridden per webhook endpoint in the database
webhook.default.timeout=30

# Maximum consecutive failures before auto-disabling endpoint
# Webhook endpoints are automatically disabled after this many consecutive failures
# to prevent wasting resources on broken endpoints
webhook.max.consecutive.failures=10

# User-Agent header sent with webhook requests
# Identifies the monitoring system in webhook request logs
webhook.user.agent=InterWeave-Monitoring/1.0

# Webhook Service Polling Configuration
# How often to check for pending webhooks (milliseconds)
# Default: 30000 (30 seconds)
webhook.polling.interval.ms=30000

# Webhook Batch Size
# Maximum number of webhooks to process per polling cycle
# Default: 50
webhook.batch.size=50

# ============================================================================
# METRICS AGGREGATION SERVICE
# ============================================================================

# Enable/disable automatic metrics aggregation
# When true, MetricsAggregator runs on schedule to aggregate raw transaction data
# into hourly and daily metrics for faster dashboard queries
metrics.aggregation.enabled=true

# Metrics aggregation interval (milliseconds)
# How often to run the aggregation job
# Default: 3600000 (60 minutes / 1 hour)
metrics.aggregation.interval.ms=3600000

# Metrics Retention Policies (days)
# How long to keep data before cleanup
# These values can also be configured in the settings table

# Raw transaction execution data retention (days)
# After this period, old transaction_executions records are deleted
# Default: 90 days (3 months)
metrics.retention.executions.days=90

# Aggregated metrics retention (days)
# After this period, old transaction_metrics records are deleted
# Default: 365 days (1 year)
metrics.retention.metrics.days=365

# Alert history retention (days)
# After this period, old alert_history records are deleted
# Default: 180 days (6 months)
metrics.retention.alerts.days=180

# ============================================================================
# TRANSACTION LOGGING SERVICE
# ============================================================================

# Maximum payload size (bytes)
# Payloads larger than this are truncated before storage
# Default: 10485760 (10 MB)
transaction.max.payload.size=10485760

# Maximum error message length (characters)
# Error messages longer than this are truncated
# Default: 5000
transaction.max.error.message.length=5000

# Maximum stack trace length (characters)
# Stack traces longer than this are truncated
# Default: 10000
transaction.max.stacktrace.length=10000

# ============================================================================
# DASHBOARD SETTINGS
# ============================================================================

# Dashboard auto-refresh interval (seconds)
# How often the dashboard should poll for new data
# Default: 10 seconds
dashboard.refresh.interval.seconds=10

# Dashboard URL (used in email links)
# Update this to match your deployment URL
dashboard.url=http://localhost:8080/iw-business-daemon/monitoring/Dashboard.jsp

# Maximum results per page for transaction history
# Can be overridden by API query parameter (up to this max)
# Default: 100
dashboard.max.page.size=100

# Default page size for transaction history
# Default: 20
dashboard.default.page.size=20

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================

# Alert Service Thread Pool Size
# Number of worker threads for async alert evaluation
# Increase if you have high transaction failure rates
# Default: 5
alert.threadpool.size=5

# Alert Service Shutdown Timeout (seconds)
# How long to wait for pending alerts during shutdown
# Default: 30
alert.shutdown.timeout.seconds=30

# Database Connection Pool Settings
# These are typically configured in Tomcat's context.xml for JNDI DataSource
# but can be referenced here for documentation purposes
#
# Recommended settings for monitoring:
# - initialSize: 5
# - maxActive: 20
# - maxIdle: 10
# - minIdle: 5
# - maxWait: 10000

# ============================================================================
# LOGGING AND DEBUGGING
# ============================================================================

# Enable debug logging for monitoring services
# When true, services log additional debug information to console
# Default: false
monitoring.debug=false

# Log successful alert deliveries
# When true, logs every successful email/webhook delivery
# Useful for debugging but can generate a lot of log entries
# Default: false
monitoring.log.success=false

# ============================================================================
# SECURITY
# ============================================================================

# IMPORTANT SECURITY NOTES:
#
# 1. File Permissions:
#    Restrict access to this file to prevent credential exposure:
#    chmod 600 monitoring.properties
#
# 2. SMTP Credentials:
#    - Use app-specific passwords (e.g., Gmail App Passwords)
#    - Rotate passwords regularly
#    - Consider environment variables for production (future enhancement)
#
# 3. Webhook Security:
#    - Use HTTPS URLs for webhook endpoints
#    - Store webhook auth tokens in webhook_endpoints table, not here
#    - Implement webhook signature verification (future enhancement)
#
# 4. Dashboard Access:
#    - Dashboard requires valid session authentication
#    - Session validation handled by MonitoringApiServlet
#    - No direct file access to monitoring data

# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# If emails are not sending:
# 1. Check email.enabled=true
# 2. Verify SMTP credentials and host/port settings
# 3. Check firewall allows outbound connections on SMTP port
# 4. Review Tomcat logs for [EmailNotificationService] errors
# 5. Test SMTP connection: telnet smtp.host port
#
# If webhooks are not sending:
# 1. Check webhook.enabled=true
# 2. Verify webhook endpoints are configured and enabled in database
# 3. Check firewall allows outbound HTTPS connections
# 4. Review Tomcat logs for [WebhookNotificationService] errors
# 5. Check webhook endpoint health in webhook_endpoints table
#
# If metrics are not aggregating:
# 1. Check metrics.aggregation.enabled=true
# 2. Review Tomcat logs for [MetricsAggregator] errors
# 3. Verify transaction_executions table has data
# 4. Check settings table for metrics_aggregation_enabled=1
#
# For more troubleshooting information, see:
# - README_EMAIL_NOTIFICATION.md
# - README_WEBHOOK_NOTIFICATION.md
# - README_ALERT_SERVICE.md
# - README_METRICS_AGGREGATOR.md

# ============================================================================
# END OF CONFIGURATION
# ============================================================================
