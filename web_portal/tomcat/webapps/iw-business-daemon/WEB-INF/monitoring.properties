# ============================================================================
# InterWeave Monitoring Dashboard Configuration
# ============================================================================
# This file contains configuration settings for the monitoring and alerting
# system. All services read this file on startup.
#
# Last Updated: 2026-01-09
# ============================================================================

# ============================================================================
# GLOBAL SETTINGS
# ============================================================================

# Enable/disable the entire monitoring system
# Set to false to disable all monitoring features (dashboard, alerts, metrics)
monitoring.enabled=true

# Enable/disable alerting globally (both email and webhook)
# When false, alerts will not be evaluated even if monitoring is enabled
alerting.enabled=true

# Default alert cooldown period in minutes
# Prevents alert spam by enforcing a minimum time between alerts for the same rule
# Can be overridden per alert rule in the database
alert.default.cooldown.minutes=15

# Maximum alerts per day per rule (default limit)
# Can be overridden per alert rule in the database
alert.default.max.per.day=50

# ============================================================================
# EMAIL NOTIFICATION SERVICE
# ============================================================================

# Enable/disable email notifications
# When false, EmailNotificationService will not start
email.enabled=true

# SMTP Server Settings
# Configure these based on your email provider (see examples below)
smtp.host=smtp.gmail.com
smtp.port=587

# SMTP Authentication
# Set to false for SMTP servers that don't require authentication
smtp.auth=true

# TLS/SSL Settings
# For port 587 (TLS/STARTTLS): smtp.starttls.enable=true, smtp.ssl.enable=false
# For port 465 (SSL): smtp.ssl.enable=true, smtp.starttls.enable=false
smtp.starttls.enable=true
smtp.ssl.enable=false

# SMTP Authentication Credentials
# Required when smtp.auth=true
# For Gmail: Use an "App Password" (not your regular password)
# https://support.google.com/accounts/answer/185833
smtp.username=your-email@gmail.com
smtp.password=your-app-password-here

# Email Sender Information
# The "from" address and name that appear in alert emails
smtp.from.email=noreply@interweave.com
smtp.from.name=InterWeave Monitoring

# SMTP Timeout Settings (milliseconds)
# Connection timeout: how long to wait for SMTP server connection
# Timeout: how long to wait for SMTP operations to complete
smtp.connectiontimeout=10000
smtp.timeout=10000

# Email Service Polling Configuration
# How often to check for pending emails (milliseconds)
# Default: 30000 (30 seconds)
email.polling.interval.ms=30000

# Email Batch Size
# Maximum number of emails to process per polling cycle
# Default: 50
email.batch.size=50

