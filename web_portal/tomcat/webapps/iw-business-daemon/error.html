<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - InterWeave IDE</title>
    <style>
        body {
            font-family: Verdana, Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .error-box {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; font-size: 20px; margin-bottom: 10px; }
        p { color: #666; font-size: 13px; line-height: 1.6; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>An error has occurred</h1>
        <p>The requested page could not be loaded. Please try again or return to the
           <a href="IWLogin.jsp">login page</a>.</p>
        <p>If the problem persists, contact your administrator.</p>
    </div>
</body>
</html>
